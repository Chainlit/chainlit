name: Check backend

on: [workflow_call]

concurrency:
  group: check-backend-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: read

jobs:
  check-backend:
    runs-on: ubuntu-latest
    name: run checks
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/uv-python-install
        name: Install Python, uv and Python dependencies
        with:
          uv-args: --no-install-workspace --all-extras --dev

      - name: 'Linting: backend'
        id: lint
        continue-on-error: true
        run: uv run --no-project scripts/lint.py

      - name: 'Formatting: backend'
        id: format
        continue-on-error: true
        run: uv run --no-project scripts/format.py --check

      - name: 'Type checking: backend'
        id: type_check
        continue-on-error: true
        run: uv run --no-project scripts/type_check.py

      - name: Fail if any check failed
        if: >-
          always() && (
            steps.lint.outcome != 'success' ||
            steps.format.outcome != 'success' ||
            steps.type_check.outcome != 'success'
          )
        run: |
          echo "One or more checks failed"
          exit 1
